    <div id="blur" class="bllur">

    <!--  -->
    <form id="form" class="form">
      <div class="d-flex justify-content-between">
        <div>
          <h1 style="font-weight: 800; font-size: 20px;">Add New Contact</h1>
        </div>
        <i id="X" class="fa-solid fa-xmark fa-lg fw-3"></i>
      </div>
      <hr style="width:100vh; height: 10px;">
     <div class="photosSection">
      <input id="fileimag" class="addimg" type="file" accept="image/*" hidden>
      <img for="valimg" id="viewimge" class="def" src="imeg/145857007_307ce493-b254-4b2d-8ba4-d12c080d6651.jpg" alt="">
      <label for="valimg" id="openphoto" class="addimg"><i class="fa-solid fa-camera"></i>Change Photo</label>
    </div>
      <!-- Name -->
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label mb-3">Full Name *</label>
        <input type="text" class="form-cntrol" id="name" placeholder="Enter full name">
       
      </div>
      <!-- Phone -->
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label mb-3">Phone Number *</label>
        <input type="tel" class="form-cntrol" id="phone" pattern="01[0-2,5]{1}[0-9]{8}"placeholder="e.g., 01012345678"> 
        <p id="phoneMessage" class="text-danger " ></p>
      </div>
      <!-- Email -->
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label ">Email address</label>
        <input type="email" class="form-cntrol " id="email" placeholder="name@example.com">
        <p id="emailMessage" class="text-danger "></p>
      </div>
      <!-- Address -->
      <div class="mb-3">
        <label class="form-label mb-3">Address</label>
        <input type="text" id="addres" class="form-cntrol" placeholder="Enter address">
      </div>
      <!-- Group -->
      <div class="mb-3">
        <label class="form-label mb-3">Group</label>
        <select class="form-cntrol" name="" id="group">
          <option value="famile">famile</option>
          <option value="frinds">frinds</option>
          <option value="work">work</option>
          <option value="school">school</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label mb-3 ">Notes</label>
        <input type="text" class="form-cntrol p-3" placeholder="Add notes about this contact">
      </div>
      <div class="d-flex alltchck">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="favoritecheck">
          <label class="form-check-label" for="exampleCheck1"><span><i class=" fa-solid me-1 fa-star"
                style="color:#feaa01;"></i></span>Favorite</label>
        </div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="emergencycheck">
          <label class="form-check-label " for="exampleCheck2"><span><i class="fa-solid  bg-transparent  fa-heart-pulse"
                style="color: crimson;"></i></span> Emergency</label>
        </div>
      </div>

      <div class="allbutton">
        <button type="button" id="cancle-button" class="buttoncencel">Cancle</button>
        <button type="button" id="saveContact" class="buttonsave">Save Contact</button>
        <button type="button" id="saveupdate" class="buttonsave" style="display: none;">Save Update</button>
      </div>
    </form>
